name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs of the same branch when a new commit arrives.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Ubuntu 24.04, CPU, single precision
    runs-on: ubuntu-24.04

    env:
      DEPS: ${{ github.workspace }}/deps

      # Versions of dependencies built from source. Bump these together with
      # the cache key below.
      HYPRE_TAG:    v2.33.0
      MFEM_TAG:     v4.9
      YAMLCPP_TAG:  yaml-cpp-0.9.0
      ADIOS2_TAG:   v2.10.2

      # Ubuntu 22.04 ships parallel HDF5 in a flavor-prefixed layout instead
      # of /usr/include and /usr/lib. Both MFEM (which has its own
      # FindHDF5.cmake) and SEMSWS need every variable spelled out, since
      # neither auto-detects this split layout reliably.
      HDF5_DIR:          /usr/lib/x86_64-linux-gnu/hdf5/openmpi
      HDF5_INCLUDE_DIRS: /usr/include/hdf5/openmpi
      HDF5_C_LIBRARY:    /usr/lib/x86_64-linux-gnu/hdf5/openmpi/libhdf5.so
      HDF5_HL_LIBRARY:   /usr/lib/x86_64-linux-gnu/hdf5/openmpi/libhdf5_hl.so

      # METIS lives at the standard apt locations.
      METIS_INCLUDE_DIRS: /usr/include
      METIS_LIBRARIES:    /usr/lib/x86_64-linux-gnu/libmetis.so

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------
      # System packages: compiler toolchain, OpenMPI, parallel HDF5, METIS.
      # ADIOS2 is built from source below (no Ubuntu apt package ships a
      # version SEMSWS can pick up reliably). NetCDF is intentionally
      # omitted: SEMSWS does not require it at the CMake level (only
      # MFEM's optional Exodus reader uses it).
      # -----------------------------------------------------------------
      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              cmake build-essential gfortran git ca-certificates \
              libopenmpi-dev openmpi-bin \
              libhdf5-openmpi-dev \
              libmetis-dev

      # Sanity-check that the paths we hard-coded actually exist on this
      # runner. Fails the job early with a clear message instead of letting
      # the CMake invocations several minutes later complain.
      - name: Verify dependency paths
        run: |
          set -e
          for f in \
              "$HDF5_INCLUDE_DIRS/H5public.h" \
              "$HDF5_C_LIBRARY" \
              "$HDF5_HL_LIBRARY" \
              "$METIS_INCLUDE_DIRS/metis.h" \
              "$METIS_LIBRARIES"; do
              test -e "$f" || { echo "MISSING: $f"; exit 1; }
              echo "OK: $f"
          done

      # -----------------------------------------------------------------
      # ccache speeds up SEMSWS recompiles across runs (deps cache covers
      # MFEM / hypre / yaml-cpp / ADIOS2; ccache covers the SEMSWS tree).
      # -----------------------------------------------------------------
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ runner.os }}-semsws
          max-size: 500M

      # -----------------------------------------------------------------
      # Heavy dependency cache. Hit ratio ~ 100% as long as the tags above
      # and this key string don't change.
      # -----------------------------------------------------------------
      - name: Cache MFEM + hypre + yaml-cpp + ADIOS2 builds
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.DEPS }}
          key: deps-${{ runner.os }}-v4-hypre${{ env.HYPRE_TAG }}-mfem${{ env.MFEM_TAG }}-yamlcpp${{ env.YAMLCPP_TAG }}-adios2${{ env.ADIOS2_TAG }}

      # -----------------------------------------------------------------
      # Build yaml-cpp 0.9.0 from source. Ubuntu 22.04 only ships 0.7.0,
      # which SEMSWS rejects via find_package(yaml-cpp 0.9.0 REQUIRED).
      # -----------------------------------------------------------------
      - name: Build yaml-cpp ${{ env.YAMLCPP_TAG }}
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$DEPS" && cd "$DEPS"
          git clone --depth=1 --branch "$YAMLCPP_TAG" \
              https://github.com/jbeder/yaml-cpp.git
          cmake -S yaml-cpp -B yaml-cpp/build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$DEPS/yaml-cpp-install" \
              -DYAML_BUILD_SHARED_LIBS=ON \
              -DYAML_CPP_BUILD_TESTS=OFF \
              -DYAML_CPP_BUILD_TOOLS=OFF
          cmake --build yaml-cpp/build --target install -j"$(nproc)"

      # -----------------------------------------------------------------
      # hypre: single precision + MPI (matches the manual's Spack spec).
      # -----------------------------------------------------------------
      - name: Build hypre ${{ env.HYPRE_TAG }}
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          cd "$DEPS"
          git clone --depth=1 --branch "$HYPRE_TAG" \
              https://github.com/hypre-space/hypre.git
          cd hypre/src
          ./configure --enable-single --with-MPI \
              CC=mpicc CXX=mpicxx
          make -j"$(nproc)"

      # -----------------------------------------------------------------
      # MFEM: parallel + HDF5 + single precision. NETCDF is left OFF.
      # Every external (hypre / METIS / HDF5) is pointed at explicitly
      # because MFEM's bundled FindHDF5 / FindMETIS do not pick up Ubuntu's
      # split paths on their own.
      # -----------------------------------------------------------------
      - name: Build MFEM ${{ env.MFEM_TAG }}
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          cd "$DEPS"
          git clone --depth=1 --branch "$MFEM_TAG" \
              https://github.com/mfem/mfem.git
          # MFEM_USE_HDF5 is OFF intentionally: MFEM 4.9's vtkhdf.cpp uses
          # HDF5 1.12+ APIs (H5S_BLOCK, H5L_info2_t, H5Literate2), but
          # Ubuntu 22.04 / 24.04 both still ship HDF5 1.10. SEMSWS itself
          # uses HDF5 directly (not through MFEM) for source/receiver I/O,
          # so turning off MFEM_USE_HDF5 has no functional impact on the
          # SEMSWS build/run.
          cmake -S mfem -B mfem/build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_CXX_COMPILER=mpicxx \
              -DMFEM_USE_MPI=ON \
              -DMFEM_USE_HDF5=OFF \
              -DMFEM_PRECISION=single \
              -DHYPRE_DIR="$DEPS/hypre/src/hypre" \
              -DMETIS_INCLUDE_DIRS="$METIS_INCLUDE_DIRS" \
              -DMETIS_LIBRARIES="$METIS_LIBRARIES"
          cmake --build mfem/build -j"$(nproc)"

      # -----------------------------------------------------------------
      # ADIOS2: MPI-enabled, no extras (Fortran / Python / SST / DataMan).
      # SEMSWS uses BP5 plus the C++11 MPI bindings (-ladios2_cxx11_mpi).
      # -----------------------------------------------------------------
      - name: Build ADIOS2 ${{ env.ADIOS2_TAG }}
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: |
          cd "$DEPS"
          git clone --depth=1 --branch "$ADIOS2_TAG" \
              https://github.com/ornladios/ADIOS2.git
          cmake -S ADIOS2 -B ADIOS2/build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_INSTALL_PREFIX="$DEPS/adios2-install" \
              -DCMAKE_CXX_COMPILER=mpicxx \
              -DCMAKE_C_COMPILER=mpicc \
              -DADIOS2_USE_MPI=ON \
              -DADIOS2_USE_HDF5=OFF \
              -DADIOS2_USE_Fortran=OFF \
              -DADIOS2_USE_Python=OFF \
              -DADIOS2_USE_SST=OFF \
              -DADIOS2_USE_DataMan=OFF \
              -DADIOS2_BUILD_EXAMPLES=OFF \
              -DBUILD_TESTING=OFF
          cmake --build ADIOS2/build --target install -j"$(nproc)"

      # -----------------------------------------------------------------
      # SEMSWS itself. Pass the same explicit HDF5 paths as MFEM (CMake's
      # built-in FindHDF5 can usually follow HDF5_ROOT, but on Ubuntu's
      # split layout the explicit form is more reliable). yaml-cpp and
      # ADIOS2 are picked up via CMAKE_PREFIX_PATH.
      # -----------------------------------------------------------------
      - name: Configure SEMSWS
        run: |
          cmake -B build \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_PREFIX_PATH="$DEPS/yaml-cpp-install;$DEPS/adios2-install" \
              -DMFEM_DIR="$DEPS/mfem/build" \
              -DHDF5_ROOT="$HDF5_DIR" \
              -DHDF5_INCLUDE_DIRS="$HDF5_INCLUDE_DIRS" \
              -DHDF5_C_LIBRARIES="$HDF5_C_LIBRARY" \
              -DHDF5_LIBRARIES="$HDF5_C_LIBRARY" \
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build SEMSWS
        run: cmake --build build -j"$(nproc)"

      - name: Verify executables
        run: |
          ls -la build/src/
          ./build/src/semsws --help || true
