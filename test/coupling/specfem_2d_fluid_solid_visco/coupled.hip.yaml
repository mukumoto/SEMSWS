# SEMSWS 2D coupled-material config for the fluid-solid vs. SPECFEM2D
# benchmark. All numbers come from examples/coupling_vs_specfem2d/config.py
# through gen.py — do NOT hand-edit runs/semsws/coupled.yaml.
name: "SEMSWS coupled vs SPECFEM2D (2D fluid-solid, force source)"

simulation:
  dimension: 2
  order: 4
  time:
    dt: 0.0005
    steps: 4000
    cfl_factor: 0.3
  output:
    directory: "./results"
    summary_file: "summary.txt"
    log_interval: 500
    wavefield:
      enabled: false
      interval: 500
      formats:
        - type: glvis

mesh:
  type: external
  file: probe.msh
  max_freq: 14.0
  ppw: 5.0

material:
  type: coupled
  fluid:
    attribute: 1
    type: isotropic_acoustic
    format: constant
    vp: 1500.0
    rho: 1000.0
    attenuation:
      enabled: true
      f0: 5
      n_units: 3
      Qkappa: 40

  solid:
    attribute: 2
    type: isotropic_elastic
    format: constant
    vp: 3000.0
    vs: 1732.0
    rho: 2500.0
    attenuation:
      enabled: true
      f0: 5
      n_units: 3
      Qkappa: 40
      Qmu: 40

boundary:
  absorbing:
    type: cerjan
    sides: []
    thickness: 0.0
    alpha: 0.0
  # Free-surface (pressure = 0) on the fluid outer boundary to match
  # SPECFEM2D, which by default applies an acoustic free-surface
  # condition to every fluid edge not listed in `absorb*` (see the
  # `48 acoustic free surf` line in xmeshfem2D's log for this mesh).
  # Tags 1/2/3/4 are bottom/right/top/left from the --mfem-bdrs probe
  # generator; the coupled facade's Dirichlet filter auto-applies it
  # only to the fluid submesh (elastic operator ignores dirichlet_*)
  # and drops the auto-generated interface attribute, so listing the
  # full outer ring here is safe.
  dirichlet:
    attributes: [1, 2, 3, 4]

sources:
  mode: simultaneous
  list:
    - id: 1
      name: "solid-force"
      # Vertical force in the solid half, toward the interface (−z).
      # SPECFEM2D SOURCE file uses source_type=1 (elastic force /
      # acoustic pressure) with time_function_type=8 pointing at
      # source_time_function.txt; SEMSWS evaluates the SAME Ricker
      # analytically from (freq, delay, amplitude) below.
      type: "force"
      location: [817.0, 613.0]
      direction: [0.0, -1.0]
      wavelet:
        type: ricker
        frequency: 5.0
        delay: 0.3
        amplitude: 10000000000.0

receivers:
  output:
    formats:
      - type: ascii
    filename: "rcv"
  type: [PS, DISP, VEL, ACC]
  list:
    - name: "R001"
      location: [800.0, 200.0]
      type: [PS]
    - name: "R002"
      location: [800.0, 440.00000000000006]
      type: [DISP, VEL, ACC]
    - name: "R003"
      location: [800.0, 680.0]
      type: [DISP, VEL, ACC]

device:
  type: hip
