# =============================================================================
# Visualization Test - 3D Elastic
# =============================================================================
# Based on test/waveform/3D/elastic/config.yaml.
# Tests all visualization output formats with elastic wavefield.

name: "Visualization Test - 3D Elastic"

# =============================================================================
# Simulation Parameters
# =============================================================================
simulation:
  dimension: 3
  order: 4

  time:
    dt: 0.001
    steps: 4000
    cfl_factor: 0.3

  output:
    directory: "./results"
    summary_file: "summary.txt"
    log_interval: 500

    # ----- Wavefield output (all formats) -----
    wavefield:
      enabled: true
      interval: 50
      fields: ["DISP"]
      formats:
        - type: "glvis"
        - type: "paraview"
          refinement: 4
          data_format: "binary32"
        - type: "gmt"
          resolution: [100, 100]
          components: [-1, 0, 1, 2]
          cross_sections:
            yz: [2500.0]
            xz: [2500.0]
            xy: [2500.0]

    # ----- Material output -----
    material:
      enabled: true
      fields: ["vp", "vs", "rho"]
      formats:
        - type: "glvis"
        - type: "paraview"
          refinement: 4
          data_format: "binary32"
        - type: "gmt"
          resolution: [100, 100]
          cross_sections:
            yz: [2500.0]
            xz: [2500.0]
            xy: [2500.0]

# =============================================================================
# Mesh Configuration
# =============================================================================
mesh:
  type: internal
  origin: [0.0, 0.0, 0.0]
  size: [5000.0, 5000.0, 5000.0]
  elements: [20, 20, 20]
  save: true
  max_freq: 2.5
  ppw: 5.0

# =============================================================================
# Material Properties
# =============================================================================
material:
  type: isotropic_elastic
  format: constant
  vp: 3000.0
  vs: 1732.0
  rho: 2500.0
  attenuation:
    enabled: false

# =============================================================================
# Boundary Conditions
# =============================================================================
boundary:
  absorbing:
    type: cerjan
    sides: []
    thickness: 1200.0
    alpha: 0.008

  dirichlet:
    attributes: []

# =============================================================================
# Sources
# =============================================================================
sources:
  mode: simultaneous

  list:
    - id: 1
      name: "Source 1"
      type: "moment_tensor"
      location: [2500.0, 2500.0, 2500.0]
      moment_tensor:
        Mxx: 1.0
        Myy: 1.0
        Mzz: 1.0
        Mxy: -1.0
        Mxz: 1.0
        Myz: -1.0
      wavelet:
        type: ricker
        frequency: 1.0
        delay: 1.2
        amplitude: 1.0e10

# =============================================================================
# Receivers
# =============================================================================
receivers:
  output:
    format: ascii
    filename: "seismograms"

  type: [DISP]

  list:
    - name: "R01"
      location: [2500.0, 3000.0, 4999.0]
    - name: "R02"
      location: [2500.0, 3500.0, 4999.0]
    - name: "R03"
      location: [3000.0, 2500.0, 4999.0]

# =============================================================================
# Device Configuration
# =============================================================================
device:
  type: cpu
  seismo_buffer_steps: 0
