
name: "3D Elastic 2-Layer Benchmark (Cubit mesh)"

# =============================================================================
# Simulation Parameters
# =============================================================================

simulation:
  dimension: 3
  order: 4            # NGLL = 5

  time:
    dt: 0.0005
    steps: 12000
    cfl_factor: 0.3

  output:
    directory: "./results"
    summary_file: "summary.txt"
    log_interval: 1000
    wavefield:
      enabled: false
      interval: 500
      formats:
        - type: glvis

# =============================================================================
# Mesh Configuration (Cubit-generated Exodus file)
# =============================================================================

mesh:
  type: external
  file: mesh_layered_3d.exo
  max_freq: 5.6
  ppw: 5
# =============================================================================
# Material Model (2 layers by attribute)
# =============================================================================

material:
  type: isotropic_elastic
  format: by_attribute
  file: materials_elastic.txt

  attenuation:
    enabled: false

# =============================================================================
# Boundary Conditions
# =============================================================================
boundary:
  absorbing:
    type: cerjan
    sides: [] #[bottom, left, right, front, back]
    thickness: 1500.
    alpha: 0.6

# =============================================================================
# Sources
# =============================================================================

sources:
  mode: simultaneous

  list:
    - id: 1
      name: "Source 1"
      type: "moment_tensor"
      location: [5000.0, 5000.0, -3000.0]  # 3km depth from surface (z=0)
      moment_tensor:
        Mxx: 0.2048
        Myy: -0.6687
        Mzz: 0.4639
        Mxy: 0.6350
        Mxz: -0.3415
        Myz: -1.586

      wavelet:
        type: ricker
        frequency: 2.0
        delay: 1.0
        amplitude: 1.0e10

# =============================================================================
# Receivers (near surface z ~ 10000)
# =============================================================================

receivers:
  output:
    formats:
      - type: ascii

  type: [DISP, VEL]

  list:
    - name: "R01"
      location: [5000.0, 6000.0, 0.0]
    - name: "R02"
      location: [5000.0, 7000.0, 0.0]
    - name: "R03"
      location: [5000.0, 8000.0, 0.0]
    - name: "R04"
      location: [6000.0, 5000.0, 0.0]
    - name: "R05"
      location: [7000.0, 5000.0, 0.0]

# =============================================================================
# Device Configuration
# =============================================================================

device:
  type: cpu
  seismo_buffer_steps: 0
